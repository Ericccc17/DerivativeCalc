<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANNY GOODY - Full Calculus Solver</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

.number-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.number{
  position:absolute;
  color:rgba(255,255,255,.25);
  font-size:18px;
  animation:float linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-100vh)}
}

.app{
  background:rgba(15,23,42,.95);
  width:100%;
  max-width:480px;
  padding:18px;
  border-radius:18px;
  color:white;
  z-index:1;
  box-shadow:0 0 30px rgba(0,0,0,.7);
}

.title{
  text-align:center;
  font-size:22px;
  color:#38bdf8;
}

.subtitle{
  text-align:center;
  font-size:12px;
  opacity:.8;
  margin-bottom:8px;
}

input{
  width:100%;
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
  margin-bottom:8px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#1e293b;
  color:white;
  transition:.3s;
}

button:hover{
  background:#38bdf8;
  color:black;
  transform:scale(1.05);
}

.solve{grid-column:span 3;background:#22c55e;}
.clear{grid-column:span 3;background:#ef4444;}

.result,.steps{
  background:#020617;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  font-size:14px;
  max-height:160px;
  overflow:auto;
}

canvas{
  background:white;
  border-radius:10px;
  margin-top:10px;
  width:100%;
}

.toggle{text-align:right;margin-bottom:5px}
.toggle button{font-size:12px;padding:6px 10px}

.light{
  background:#f3f4f6;
  color:black;
}

.light .app{background:white;color:black}
.light button{background:#e5e7eb;color:black}
.light .result,.light .steps{background:#f3f4f6}
</style>
</head>

<body id="body">

<div class="number-bg" id="number-bg"></div>

<div class="app">

<div class="toggle">
  <button onclick="toggleMode()">🌗 Mode</button>
</div>

<h1 class="title">CANNY GOODY</h1>
<div class="subtitle">Full Calculus Solver • Final School Project</div>

<input id="display" placeholder="Enter function e.g. sin(x)+3x^2">
<input id="order" type="number" placeholder="Derivative Order (1,2,3...)" value="1">
<input id="xval" type="number" placeholder="x-value for tangent line (optional)">

<div class="buttons">
<button onclick="add('sin(')">sin</button>
<button onclick="add('cos(')">cos</button>
<button onclick="add('tan(')">tan</button>
<button onclick="add('ln(')">ln</button>
<button onclick="add('sqrt(')">√</button>
<button onclick="add('^')">^</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('+')">+</button>
<button onclick="add('-')">−</button>
<button onclick="add('*')">×</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('/')">÷</button>
<button onclick="add('x')">x</button>
<button onclick="add('(')">(</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('0')">0</button>
<button onclick="add(')')">)</button>
<button onclick="add('pi')">π</button>

<button class="solve" onclick="solve()">SOLVE</button>
<button class="clear" onclick="clearAll()">CLEAR</button>
</div>

<div class="result" id="result">Result:</div>
<div class="steps" id="steps">Steps:</div>

<canvas id="graph"></canvas>

</div>

<script>
const bg=document.getElementById("number-bg");
const sym=["0","1","2","x","+","^","sin","cos","ln","π"];
for(let i=0;i<80;i++){
  let s=document.createElement("span");
  s.className="number";
  s.textContent=sym[Math.floor(Math.random()*sym.length)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(8+Math.random()*15)+"s";
  s.style.fontSize=(12+Math.random()*25)+"px";
  bg.appendChild(s);
}

let chart;

function add(v){display.value+=v}

function clearAll(){
  display.value="";
  order.value=1;
  xval.value="";
  result.innerHTML="Result:";
  steps.innerHTML="Steps:";
  if(chart) chart.destroy();
}

function toggleMode(){
  document.getElementById("body").classList.toggle("light");
}

function nthDerivative(expr,n){
  let d=expr;
  for(let i=0;i<n;i++){
    d=math.derivative(d,'x').toString();
  }
  return d;
}

function solve(){
  let expr=display.value;
  let n=parseInt(order.value)||1;
  let x=parseFloat(xval.value);

  try{
    let d=nthDerivative(expr,n);

    result.innerHTML=`${n}ᵗʰ Derivative: <b>${d}</b>`;

    let step=`1) Given f(x) = ${expr}<br>`;
    for(let i=1;i<=n;i++){
      step+=`${i}) ${i}ᵗʰ derivative = ${nthDerivative(expr,i)}<br>`;
    }

    if(!isNaN(x)){
      let slope=math.evaluate(d,{x});
      let y=math.evaluate(expr,{x});
      let tangent=`${slope}*(x-${x})+${y}`;
      step+=`<br>Tangent line at x=${x}:<br>y = ${tangent}<br>`;
    }

    steps.innerHTML=step;

    drawGraph(expr,d);

  }catch(e){
    result.innerHTML="⚠ Invalid Expression";
  }
}

function drawGraph(f,df){
  let xs=[],ys=[],dys=[];
  for(let x=-10;x<=10;x+=0.5){
    xs.push(x);
    ys.push(math.evaluate(f,{x}));
    dys.push(math.evaluate(df,{x}));
  }

  let ctx=document.getElementById("graph").getContext("2d");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels:xs,
      datasets:[
        {label:'f(x)',data:ys,borderColor:'blue',fill:false},
        {label:"f'(x)",data:dys,borderColor:'red',fill:false}
      ]
    },
    options:{responsive:true}
  });
}
</script>

</body>
</html>
